name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify search-engine files in build output
        run: |
          test -f dist/sitemap.xml
          test -f dist/sitemap-pages.xml
          test -f dist/robots.txt
          test -f dist/project/draglab/index.html
          test -f dist/project/techparadise/index.html
          test -f dist/project/snowlex/index.html
          test -f dist/experience/snowlex/index.html
          test -f dist/experience/draglab/index.html
          cmp public/sitemap.xml dist/sitemap.xml
          cmp public/sitemap-pages.xml dist/sitemap-pages.xml
          cmp public/robots.txt dist/robots.txt
          test "$(head -c 5 dist/sitemap.xml)" = "<?xml"
          test "$(head -c 5 dist/sitemap-pages.xml)" = "<?xml"
          test "$(grep -c '<loc>' dist/sitemap.xml)" -eq 6
          test "$(grep -c '<loc>' dist/sitemap-pages.xml)" -eq 6
          ! grep -Fq '#' dist/sitemap.xml
          ! grep -Fq '#' dist/sitemap-pages.xml
          grep -Fq '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' dist/sitemap.xml
          grep -Fq 'https://mohammed-alazaar.github.io/portfolio/' dist/sitemap.xml
          grep -Fq 'Sitemap: https://mohammed-alazaar.github.io/portfolio/sitemap-pages.xml' dist/robots.txt
          echo "---- sitemap.xml ----"
          cat dist/sitemap.xml
          echo "---- sitemap-pages.xml ----"
          cat dist/sitemap-pages.xml
          echo "---- robots.txt ----"
          cat dist/robots.txt

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
